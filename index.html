<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>محمدامین دشتبان | تیراندازی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: manipulation;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: fixed;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none;
        }
        .hud-item {
            background: rgba(0,0,0,0.7);
            border: 2px solid #ff6600;
            border-radius: 10px;
            padding: 6px 14px;
            color: #ffaa00;
            font-weight: bold;
            font-size: 15px;
            text-shadow: 0 0 10px #ff6600;
        }
        #nameTag {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,170,0,0.5);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
        }
        #gameOver {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 20;
            background: rgba(0,0,0,0.85);
            padding: 30px 40px;
            border-radius: 20px;
            border: 2px solid #ff3300;
        }
        #gameOver.show {
            display: flex;
        }
        .go-title {
            color: #ff3300;
            font-size: 35px;
            font-weight: bold;
            text-shadow: 0 0 20px #ff0000;
        }
        .go-score {
            color: #ffaa00;
            font-size: 55px;
            font-weight: bold;
            text-shadow: 0 0 30px #ff6600;
        }
        .go-btn {
            background: #ff6600;
            color: #000;
            border: none;
            font-size: 20px;
            padding: 12px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            z-index: 21;
        }
        .go-btn:active {
            transform: scale(0.9);
            background: #ff4400;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    
    <div id="hud">
        <div class="hud-item">💀 <span id="scoreHud">0</span></div>
        <div class="hud-item">🎯 <span id="accHud">0%</span></div>
        <div class="hud-item">🌊 موج <span id="waveHud">1</span></div>
    </div>
    
    <div id="nameTag">🏹 محمدامین دشتبان 🏹</div>
    
    <div id="gameOver">
        <div style="color:#ffaa00;font-size:20px;">🏹 محمدامین دشتبان</div>
        <div class="go-title">شکست خوردی!</div>
        <div class="go-score" id="finalScore">0</div>
        <div style="color:#ffaa00;">دشمنان کشته شده</div>
        <button class="go-btn" onclick="restartGame()">🔄 نبرد دوباره</button>
    </div>

    <script>
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        
        c.width = window.innerWidth;
        c.height = window.innerHeight;
        window.addEventListener('resize', () => {
            c.width = window.innerWidth;
            c.height = window.innerHeight;
        });
        
        // ==================== AUDIO ====================
        let audio;
        function initAudio() {
            if (!audio) {
                audio = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function beep(f, d, t='square', v=0.06) {
            if (!audio) return;
            try {
                const o = audio.createOscillator();
                const g = audio.createGain();
                o.connect(g); g.connect(audio.destination);
                o.type = t; o.frequency.value = f;
                g.gain.setValueAtTime(v, audio.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + d);
                o.start(); o.stop(audio.currentTime + d);
            } catch(e) {}
        }
        
        function sndShoot() { beep(250, 0.12, 'sawtooth', 0.08); beep(700, 0.06, 'square', 0.05); }
        function sndHit() { beep(100, 0.2, 'square', 0.1); }
        function sndKill() { beep(500, 0.08, 'square', 0.08); beep(800, 0.08, 'square', 0.08); beep(1100, 0.12, 'sine', 0.1); }
        function sndWave() { for(let i=0;i<3;i++) setTimeout(()=>beep(300+i*150,0.15,'triangle',0.06),i*120); }
        
        // ==================== GAME ====================
        let running = true;
        let score = 0, shots = 0, hits = 0, wave = 1;
        let player = { x: c.width/2, y: c.height-100, w: 40, h: 55 };
        let enemies = [], arrows = [], parts = [];
        let spawnTimer = 0, enemiesLeft = 5 + wave * 2;
        
        // Mouse/touch
        let mx = c.width/2, my = c.height/2;
        let aiming = false, aimX = 0, aimY = 0, power = 0;
        const MAX_POWER = 80;
        
        // ==================== ENEMY ====================
        function spawnEnemy() {
            const types = ['soldier','runner','tank'];
            const type = types[Math.floor(Math.random()*3)];
            let e = { type, x: Math.random()*(c.width-80)+40, y: -60 - Math.random()*200, hitFlash: 0 };
            
            switch(type) {
                case 'soldier': e.w=35; e.h=50; e.spd=1+wave*0.3; e.hp=1; e.color='#ff4444'; e.pts=10; break;
                case 'runner': e.w=25; e.h=35; e.spd=2.5+wave*0.4; e.hp=1; e.color='#ff8800'; e.pts=20; break;
                case 'tank': e.w=55; e.h=70; e.spd=0.7+wave*0.2; e.hp=2+Math.floor(wave/3); e.color='#cc00ff'; e.pts=50; break;
            }
            e.maxHp = e.hp;
            enemies.push(e);
        }
        
        // ==================== ARROW ====================
        function shoot() {
            const angle = Math.atan2(my - player.y, mx - player.x);
            const p = Math.min(power, MAX_POWER) + 20;
            arrows.push({
                x: player.x, y: player.y,
                vx: Math.cos(angle) * p * 0.15,
                vy: Math.sin(angle) * p * 0.15,
                angle, life: 100, trail: []
            });
            shots++;
            power = 0;
            sndShoot();
        }
        
        // ==================== PARTICLES ====================
        function burst(x, y, col, n=15) {
            for(let i=0; i<n; i++) {
                parts.push({
                    x, y,
                    vx: (Math.random()-0.5)*8,
                    vy: (Math.random()-0.5)*8,
                    size: Math.random()*4+2,
                    color: col, life: 1
                });
            }
        }
        
        // ==================== INPUT ====================
        c.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
        
        c.addEventListener('mousedown', e => {
            if(!running) return;
            initAudio();
            aimX = e.clientX; aimY = e.clientY;
            aiming = true; power = 0;
        });
        
        c.addEventListener('mouseup', () => {
            if(!running || !aiming) return;
            shoot(); aiming = false;
        });
        
        c.addEventListener('touchstart', e => {
            if(!running) return;
            e.preventDefault();
            initAudio();
            const t = e.touches[0];
            aimX = t.clientX; aimY = t.clientY;
            aiming = true; power = 0;
        }, {passive: false});
        
        c.addEventListener('touchmove', e => {
            if(!running) return;
            e.preventDefault();
            mx = e.touches[0].clientX;
            my = e.touches[0].clientY;
        }, {passive: false});
        
        c.addEventListener('touchend', e => {
            if(!running || !aiming) return;
            e.preventDefault();
            shoot(); aiming = false;
        }, {passive: false});
        
        // ==================== RESTART ====================
        function restartGame() {
            initAudio();
            running = true;
            score = 0; shots = 0; hits = 0; wave = 1;
            enemies = []; arrows = []; parts = [];
            spawnTimer = 0; enemiesLeft = 5 + wave * 2;
            player.x = c.width/2; player.y = c.height-100;
            power = 0; aiming = false;
            document.getElementById('gameOver').classList.remove('show');
            updateHUD();
            sndWave();
        }
        
        function gameOver() {
            running = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').classList.add('show');
            beep(40, 0.5, 'sawtooth', 0.12);
        }
        
        function updateHUD() {
            document.getElementById('scoreHud').textContent = score;
            document.getElementById('accHud').textContent = shots>0 ? Math.round(hits/shots*100)+'%' : '0%';
            document.getElementById('waveHud').textContent = wave;
        }
        
        function nextWave() {
            wave++;
            enemiesLeft = 5 + wave * 2;
            updateHUD();
            sndWave();
        }
        
        // ==================== UPDATE ====================
        function update() {
            if(!running) return;
            
            if(aiming) power = Math.min(power+2, MAX_POWER);
            
            // Spawn
            if(enemiesLeft > 0) {
                spawnTimer++;
                if(spawnTimer >= Math.max(25, 80 - wave*5)) {
                    spawnTimer = 0;
                    spawnEnemy();
                    enemiesLeft--;
                }
            } else if(enemies.length === 0) {
                nextWave();
            }
            
            // Arrows
            for(let i=arrows.length-1; i>=0; i--) {
                const a = arrows[i];
                a.trail.push({x:a.x, y:a.y, life:1});
                if(a.trail.length > 8) a.trail.shift();
                a.trail.forEach(t=>t.life-=0.1);
                
                a.x += a.vx;
                a.y += a.vy;
                a.vy += 0.05;
                a.life--;
                
                let hit = false;
                for(let j=enemies.length-1; j>=0; j--) {
                    const e = enemies[j];
                    if(a.x > e.x-e.w/2 && a.x < e.x+e.w/2 && a.y > e.y && a.y < e.y+e.h) {
                        e.hp--;
                        e.hitFlash = 8;
                        burst(a.x, a.y, e.color, 6);
                        
                        if(e.hp <= 0) {
                            burst(e.x, e.y, e.color, 20);
                            score += e.pts;
                            hits++;
                            enemies.splice(j, 1);
                            sndKill();
                        } else {
                            sndHit();
                        }
                        
                        arrows.splice(i, 1);
                        hit = true;
                        updateHUD();
                        break;
                    }
                }
                
                if(!hit && (a.life<=0 || a.x<-50 || a.x>c.width+50 || a.y<-50 || a.y>c.height+50)) {
                    arrows.splice(i, 1);
                }
            }
            
            // Enemies
            for(let i=enemies.length-1; i>=0; i--) {
                const e = enemies[i];
                e.y += e.spd;
                if(e.type==='soldier') e.x += Math.sin(e.y*0.05)*1.5;
                if(e.hitFlash > 0) e.hitFlash--;
                
                const dist = Math.hypot(player.x-e.x, player.y-e.y);
                if(dist < 45 && e.y > player.y-35) {
                    burst(player.x, player.y, '#ff0000', 30);
                    burst(e.x, e.y, e.color, 20);
                    gameOver();
                    return;
                }
                
                if(e.y > c.height+100) enemies.splice(i, 1);
            }
            
            // Particles
            for(let i=parts.length-1; i>=0; i--) {
                const p = parts[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.life -= 0.03;
                if(p.life <= 0) parts.splice(i, 1);
            }
        }
        
        // ==================== RENDER ====================
        function render() {
            // BG
            const bg = ctx.createLinearGradient(0,0,0,c.height);
            bg.addColorStop(0, '#0a0a2e');
            bg.addColorStop(0.5, '#1a0a2e');
            bg.addColorStop(1, '#0a0a0a');
            ctx.fillStyle = bg;
            ctx.fillRect(0,0,c.width,c.height);
            
            // Stars
            for(let i=0;i<40;i++) {
                const x = (i*97+31)%c.width;
                const y = (i*73+Date.now()*0.03)%c.height;
                ctx.fillStyle = `rgba(255,255,255,${0.3+Math.sin(i)*0.2})`;
                ctx.beginPath(); ctx.arc(x,y,1.5,0,Math.PI*2); ctx.fill();
            }
            
            // Particles
            parts.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;
            
            // Enemies
            enemies.forEach(e => {
                ctx.save();
                ctx.fillStyle = e.hitFlash>0 ? '#fff' : e.color;
                ctx.shadowColor = e.color;
                ctx.shadowBlur = 10;
                
                if(e.type==='soldier') {
                    ctx.fillRect(e.x-e.w/2, e.y, e.w, e.h);
                    ctx.beginPath(); ctx.arc(e.x, e.y-5, 12, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#f00';
                    ctx.beginPath(); ctx.arc(e.x-4, e.y-8, 2, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(e.x+4, e.y-8, 2, 0, Math.PI*2); ctx.fill();
                } else if(e.type==='runner') {
                    ctx.fillRect(e.x-e.w/2, e.y, e.w, e.h);
                    ctx.beginPath(); ctx.arc(e.x, e.y-3, 10, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#ff0';
                    ctx.fillRect(e.x-4, e.y-8, 3, 2);
                    ctx.fillRect(e.x+1, e.y-8, 3, 2);
                } else {
                    ctx.fillRect(e.x-e.w/2, e.y, e.w, e.h);
                    ctx.beginPath(); ctx.arc(e.x, e.y-8, 16, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#f0f';
                    ctx.beginPath(); ctx.arc(e.x-5, e.y-12, 3, 0, Math.PI*2); ctx.fill();
                    ctx.beginPath(); ctx.arc(e.x+5, e.y-12, 3, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#333';
                    ctx.fillRect(e.x-20, e.y-25, 40, 5);
                    ctx.fillStyle = '#0f0';
                    ctx.fillRect(e.x-20, e.y-25, 40*(e.hp/e.maxHp), 5);
                }
                ctx.restore();
            });
            
            // Arrows
            arrows.forEach(a => {
                a.trail.forEach((t,i) => {
                    ctx.strokeStyle = `rgba(255,150,0,${t.life*0.4})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    const prev = a.trail[i-1] || a;
                    ctx.moveTo(prev.x, prev.y);
                    ctx.lineTo(t.x, t.y);
                    ctx.stroke();
                });
                
                ctx.save();
                ctx.translate(a.x, a.y);
                ctx.rotate(a.angle);
                ctx.fillStyle = '#fa0';
                ctx.shadowColor = '#f60';
                ctx.shadowBlur = 8;
                ctx.fillRect(-15, -2, 30, 4);
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.moveTo(15,0); ctx.lineTo(8,-5); ctx.lineTo(8,5); ctx.closePath(); ctx.fill();
                ctx.fillStyle = '#f30';
                ctx.beginPath(); ctx.moveTo(-15,0); ctx.lineTo(-22,-7); ctx.lineTo(-18,0); ctx.lineTo(-22,7); ctx.closePath(); ctx.fill();
                ctx.restore();
            });
            
            // Player
            if(running) {
                const px = player.x, py = player.y;
                const angle = Math.atan2(my-py, mx-px);
                
                ctx.save();
                ctx.translate(px, py);
                
                ctx.fillStyle = '#36c';
                ctx.shadowColor = '#36c';
                ctx.shadowBlur = 8;
                ctx.fillRect(-15, 0, 30, 50);
                
                ctx.fillStyle = '#fc9';
                ctx.beginPath(); ctx.arc(0, -8, 14, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(-5, -12, 3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(5, -12, 3, 0, Math.PI*2); ctx.fill();
                
                ctx.rotate(angle);
                ctx.strokeStyle = '#8B4513';
                ctx.lineWidth = 4;
                ctx.beginPath(); ctx.arc(25, 0, 20, -Math.PI/3, Math.PI/3); ctx.stroke();
                ctx.strokeStyle = '#ccc';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(25+20*Math.cos(-Math.PI/3), 20*Math.sin(-Math.PI/3));
                ctx.lineTo(25+20*Math.cos(Math.PI/3), 20*Math.sin(Math.PI/3));
                ctx.stroke();
                
                if(aiming) {
                    const pp = power/MAX_POWER;
                    ctx.fillStyle = `rgba(255,${Math.floor(255*(1-pp))},0,0.7)`;
                    ctx.fillRect(30, -15, 40*pp, 8);
                    ctx.strokeStyle = '#fff';
                    ctx.strokeRect(30, -15, 40, 8);
                }
                
                ctx.restore();
                
                ctx.fillStyle = '#fa0';
                ctx.font = 'bold 13px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('🏹 محمدامین', px, py-45);
            }
            
            // Crosshair
            if(running) {
                ctx.strokeStyle = '#f00';
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(mx, my, 15, 0, Math.PI*2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(mx-20,my); ctx.lineTo(mx+20,my);
                ctx.moveTo(mx,my-20); ctx.lineTo(mx,my+20); ctx.stroke();
            }
            
            // Ground
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, c.height-5, c.width, 5);
        }
        
        // ==================== LOOP ====================
        function loop() {
            update();
            render();
            requestAnimationFrame(loop);
        }
        
        loop();
        updateHUD();
        console.log('🏹 بازی شروع شد! نشانه بگیر و شلیک کن');
    </script>
</body>
</html>
