<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>محمدامین دشتبان | نبرد حماسی</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background:#000;
            overflow:hidden;
            height:100vh;
            width:100vw;
            touch-action:manipulation;
            user-select:none;
            font-family:Arial,sans-serif;
        }
        canvas{display:block}
        
        #hud{
            position:fixed;
            top:10px;
            left:10px;
            right:10px;
            display:flex;
            justify-content:space-between;
            z-index:10;
            pointer-events:none;
            gap:5px;
        }
        .hud-item{
            background:rgba(0,0,0,0.75);
            border:2px solid #ff6600;
            border-radius:8px;
            padding:5px 10px;
            color:#ffaa00;
            font-weight:bold;
            font-size:13px;
            text-shadow:0 0 8px #ff6600;
            backdrop-filter:blur(5px);
            text-align:center;
        }
        .hud-val{
            font-size:20px;
            color:#fff;
            text-shadow:0 0 12px #ffaa00;
        }
        
        #skillBar{
            position:fixed;
            bottom:80px;
            left:50%;
            transform:translateX(-50%);
            display:flex;
            gap:8px;
            z-index:10;
        }
        .skill-btn{
            width:50px;
            height:50px;
            border-radius:50%;
            background:rgba(0,0,0,0.7);
            border:2px solid #ff6600;
            color:#ffaa00;
            font-size:22px;
            cursor:pointer;
            display:flex;
            align-items:center;
            justify-content:center;
            transition:all 0.2s;
        }
        .skill-btn:active{
            background:rgba(255,102,0,0.4);
            transform:scale(0.85);
        }
        .skill-btn.ready{
            border-color:#00ff00;
            box-shadow:0 0 15px rgba(0,255,0,0.5);
            animation:pulse 1s infinite;
        }
        @keyframes pulse{
            0%,100%{box-shadow:0 0 10px rgba(0,255,0,0.3)}
            50%{box-shadow:0 0 25px rgba(0,255,0,0.7)}
        }
        .skill-cooldown{
            position:absolute;
            bottom:-18px;
            font-size:9px;
            color:#888;
            white-space:nowrap;
        }
        
        #comboText{
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            font-size:50px;
            font-weight:bold;
            color:#ffaa00;
            text-shadow:0 0 30px #ff6600;
            pointer-events:none;
            z-index:5;
            opacity:0;
            transition:all 0.3s;
        }
        
        #nameTag{
            position:fixed;
            bottom:8px;
            left:50%;
            transform:translateX(-50%);
            color:rgba(255,170,0,0.5);
            font-size:11px;
            z-index:10;
            pointer-events:none;
            letter-spacing:2px;
        }
        
        #gameOver{
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            display:none;
            flex-direction:column;
            align-items:center;
            gap:12px;
            z-index:20;
            background:rgba(0,0,0,0.9);
            padding:30px 40px;
            border-radius:20px;
            border:2px solid #ff3300;
            box-shadow:0 0 60px rgba(255,0,0,0.4);
        }
        #gameOver.show{display:flex}
        .go-title{
            color:#ff3300;
            font-size:32px;
            font-weight:bold;
            text-shadow:0 0 25px #ff0000;
            animation:shake 0.5s;
        }
        @keyframes shake{
            0%,100%{transform:translateX(0)}
            25%{transform:translateX(-8px)}
            75%{transform:translateX(8px)}
        }
        .go-score{
            color:#ffaa00;
            font-size:60px;
            font-weight:bold;
            text-shadow:0 0 35px #ff6600;
        }
        .go-stats{
            color:#ccc;
            font-size:13px;
            display:flex;
            gap:20px;
        }
        .go-btn{
            background:linear-gradient(180deg,#ff6600,#cc3300);
            color:#fff;
            border:none;
            font-size:18px;
            padding:14px 45px;
            border-radius:50px;
            cursor:pointer;
            font-weight:bold;
            z-index:21;
            transition:all 0.3s;
            box-shadow:0 0 25px rgba(255,102,0,0.5);
        }
        .go-btn:active{
            transform:scale(0.9);
            box-shadow:0 0 45px rgba(255,102,0,0.8);
        }
        
        #killFeed{
            position:fixed;
            right:10px;
            top:50%;
            transform:translateY(-50%);
            display:flex;
            flex-direction:column;
            gap:3px;
            z-index:8;
            pointer-events:none;
        }
        .kill-msg{
            color:#ffaa00;
            font-size:12px;
            text-shadow:0 0 8px #ff6600;
            animation:fadeOut 2s forwards;
            white-space:nowrap;
        }
        @keyframes fadeOut{
            0%{opacity:1;transform:translateX(0)}
            100%{opacity:0;transform:translateX(50px)}
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    
    <div id="hud">
        <div class="hud-item">
            💀 کشته<br><span class="hud-val" id="scoreHud">0</span>
        </div>
        <div class="hud-item">
            ❤️ جان<br><span class="hud-val" id="hpHud">100</span>
        </div>
        <div class="hud-item">
            🎯 دقت<br><span class="hud-val" id="accHud">0%</span>
        </div>
        <div class="hud-item">
            🌊 موج<br><span class="hud-val" id="waveHud">1</span>
        </div>
        <div class="hud-item">
            🔥 کومبو<br><span class="hud-val" id="comboHud">0x</span>
        </div>
    </div>
    
    <div id="killFeed"></div>
    <div id="comboText"></div>
    
    <div id="skillBar">
        <button class="skill-btn ready" id="skill1" onclick="useSkill1()">
            💥<span class="skill-cooldown" id="cd1"></span>
        </button>
        <button class="skill-btn ready" id="skill2" onclick="useSkill2()">
            🧊<span class="skill-cooldown" id="cd2"></span>
        </button>
        <button class="skill-btn ready" id="skill3" onclick="useSkill3()">
            ⚡<span class="skill-cooldown" id="cd3"></span>
        </button>
    </div>
    
    <div id="nameTag">🏹 محمدامین دشتبان | ARCHER LEGEND 🏹</div>
    
    <div id="gameOver">
        <div style="color:#ffaa00;font-size:18px;">🏹 محمدامین دشتبان</div>
        <div class="go-title">💀 شکست خوردی!</div>
        <div class="go-score" id="finalScore">0</div>
        <div class="go-stats">
            <span>🎯 <span id="finalAcc">0%</span></span>
            <span>🌊 موج <span id="finalWave">1</span></span>
            <span>🔥 کومبو <span id="finalCombo">0x</span></span>
        </div>
        <button class="go-btn" onclick="restartGame()">🔄 نبرد دوباره</button>
    </div>

    <script>
        const c = document.getElementById('c');
        const ctx = c.getContext('2d');
        
        c.width = window.innerWidth;
        c.height = window.innerHeight;
        window.addEventListener('resize', () => { c.width = window.innerWidth; c.height = window.innerHeight; });
        
        // ==================== AUDIO ====================
        let audio;
        function initAudio() {
            if(!audio) audio = new (window.AudioContext||window.webkitAudioContext)();
        }
        function beep(f,d,t='square',v=0.05) {
            if(!audio) return;
            try {
                const o=audio.createOscillator(),g=audio.createGain();
                o.connect(g);g.connect(audio.destination);
                o.type=t;o.frequency.value=f;
                g.gain.setValueAtTime(v,audio.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001,audio.currentTime+d);
                o.start();o.stop(audio.currentTime+d);
            }catch(e){}
        }
        function sndShoot(){beep(200,0.1,'sawtooth',0.06);beep(600,0.05,'square',0.04)}
        function sndHit(){beep(80,0.15,'square',0.08)}
        function sndKill(){beep(400,0.06,'square',0.06);beep(700,0.06,'square',0.06);beep(1000,0.1,'sine',0.08)}
        function sndWave(){for(let i=0;i<4;i++)setTimeout(()=>beep(250+i*200,0.15,'triangle',0.05),i*100)}
        function sndExplosion(){beep(40,0.4,'sawtooth',0.15);beep(30,0.5,'square',0.1)}
        function sndFreeze(){beep(800,0.3,'sine',0.08);beep(600,0.3,'sine',0.06)}
        function sndLightning(){beep(2000,0.1,'square',0.1);beep(1500,0.15,'sawtooth',0.08)}
        
        // ==================== GAME STATE ====================
        let running = true;
        let score = 0, shots = 0, hits = 0, wave = 1;
        let playerHP = 100, maxHP = 100;
        let combo = 0, maxCombo = 0, comboTimer = 0;
        let player = {x:c.width/2, y:c.height-100, w:40, h:55, shield:0, speed:1};
        let enemies = [], arrows = [], parts = [], floatingTexts = [];
        let spawnTimer = 0, enemiesLeft = 5 + wave*2;
        
        // Skills
        let skills = {
            explosion: {cd:0, maxCd:300},
            freeze: {cd:0, maxCd:400},
            lightning: {cd:0, maxCd:250}
        };
        
        let isFrozen = false, freezeTimer = 0;
        
        // Mouse
        let mx=c.width/2, my=c.height/2;
        let aiming=false, aimX=0, aimY=0, power=0;
        const MAX_POWER = 100;
        
        // Kill feed
        function addKillMsg(msg) {
            const div = document.createElement('div');
            div.className = 'kill-msg';
            div.textContent = msg;
            document.getElementById('killFeed').appendChild(div);
            setTimeout(()=>div.remove(), 2000);
        }
        
        // Floating text
        function floatText(x,y,text,color='#ff0') {
            floatingTexts.push({x,y,text,color,life:1,vy:-3});
        }
        
        function showCombo() {
            const el = document.getElementById('comboText');
            if(combo >= 5) {
                el.textContent = `🔥 ${combo}x COMBO!`;
                el.style.opacity = '1';
                el.style.transform = 'translate(-50%,-50%) scale(1.3)';
                setTimeout(()=>{
                    el.style.opacity = '0';
                    el.style.transform = 'translate(-50%,-50%) scale(1)';
                }, 800);
            }
        }
        
        // ==================== ENEMIES ====================
        function spawnEnemy() {
            const types = ['soldier','runner','tank','sniper','bomber'];
            const type = types[Math.floor(Math.random()*types.length)];
            let e = {type, x:Math.random()*(c.width-80)+40, y:-60-Math.random()*250, hitFlash:0, frozen:false};
            
            switch(type) {
                case 'soldier': e.w=35;e.h=50;e.spd=1+wave*0.3;e.hp=1+Math.floor(wave/4);e.color='#ff4444';e.pts=10;break;
                case 'runner': e.w=25;e.h=35;e.spd=2.5+wave*0.5;e.hp=1;e.color='#ff8800';e.pts=20;break;
                case 'tank': e.w=60;e.h=75;e.spd=0.6+wave*0.15;e.hp=3+Math.floor(wave/3);e.color='#cc00ff';e.pts=50;break;
                case 'sniper': e.w=30;e.h=45;e.spd=0.4;e.hp=2;e.color='#00ff00';e.pts=35;e.canShoot=true;e.shootTimer=0;break;
                case 'bomber': e.w=45;e.h=55;e.spd=1.5+wave*0.3;e.hp=2;e.color='#ff0000';e.pts=40;e.explode=true;break;
            }
            e.maxHp = e.hp;
            enemies.push(e);
        }
        
        // ==================== PARTICLES ====================
        function burst(x,y,col,n=15,spd=8) {
            for(let i=0;i<n;i++) {
                parts.push({
                    x,y,
                    vx:(Math.random()-0.5)*spd,
                    vy:(Math.random()-0.5)*spd,
                    size:Math.random()*5+2,
                    color:col,life:1
                });
            }
        }
        
        // ==================== SKILLS ====================
        function useSkill1() {
            if(skills.explosion.cd > 0 || !running) return;
            initAudio();
            skills.explosion.cd = skills.explosion.maxCd;
            sndExplosion();
            
            // Damage all enemies on screen
            enemies.forEach(e => {
                e.hp -= 3;
                e.hitFlash = 15;
                burst(e.x, e.y, '#ff6600', 25, 12);
            });
            
            // Kill low HP enemies
            for(let i=enemies.length-1; i>=0; i--) {
                if(enemies[i].hp <= 0) {
                    burst(enemies[i].x, enemies[i].y, enemies[i].color, 35, 15);
                    score += enemies[i].pts;
                    hits++;
                    enemies.splice(i,1);
                    combo++;
                    comboTimer = 120;
                }
            }
            updateHUD();
            showCombo();
        }
        
        function useSkill2() {
            if(skills.freeze.cd > 0 || !running) return;
            initAudio();
            skills.freeze.cd = skills.freeze.maxCd;
            sndFreeze();
            isFrozen = true;
            freezeTimer = 180;
            burst(player.x, player.y-30, '#88ccff', 20, 6);
        }
        
        function useSkill3() {
            if(skills.lightning.cd > 0 || !running) return;
            initAudio();
            skills.lightning.cd = skills.lightning.maxCd;
            sndLightning();
            
            // Find closest enemy and insta-kill
            let closest = null, closestDist = Infinity;
            enemies.forEach(e => {
                const d = Math.hypot(player.x-e.x, player.y-e.y);
                if(d < closestDist) { closestDist = d; closest = e; }
            });
            
            if(closest) {
                burst(closest.x, closest.y, '#ffff00', 30, 10);
                score += closest.pts * 2;
                hits++;
                combo++;
                comboTimer = 120;
                floatText(closest.x, closest.y, '⚡', '#ffff00');
                const idx = enemies.indexOf(closest);
                enemies.splice(idx, 1);
                updateHUD();
                showCombo();
                addKillMsg('⚡ صاعقه!');
            }
        }
        
        // ==================== INPUT ====================
        c.addEventListener('mousemove', e=>{mx=e.clientX;my=e.clientY});
        c.addEventListener('mousedown', e=>{
            if(!running) return;
            initAudio();
            aimX=e.clientX;aimY=e.clientY;
            aiming=true;power=0;
        });
        c.addEventListener('mouseup', ()=>{
            if(!running||!aiming) return;
            shoot();aiming=false;
        });
        c.addEventListener('touchstart', e=>{
            if(!running) return;
            e.preventDefault();
            initAudio();
            const t=e.touches[0];
            aimX=t.clientX;aimY=t.clientY;
            aiming=true;power=0;
        },{passive:false});
        c.addEventListener('touchmove', e=>{
            if(!running) return;
            e.preventDefault();
            mx=e.touches[0].clientX;
            my=e.touches[0].clientY;
        },{passive:false});
        c.addEventListener('touchend', e=>{
            if(!running||!aiming) return;
            e.preventDefault();
            shoot();aiming=false;
        },{passive:false});
        
        document.addEventListener('keydown', e=>{
            if(!running) return;
            switch(e.key) {
                case '1': useSkill1(); break;
                case '2': useSkill2(); break;
                case '3': useSkill3(); break;
                case 'a': case 'ArrowLeft': player.x-=20; break;
                case 'd': case 'ArrowRight': player.x+=20; break;
            }
        });
        
        function shoot() {
            const angle = Math.atan2(my-player.y, mx-player.x);
            const p = Math.min(power, MAX_POWER) + 25;
            arrows.push({
                x:player.x, y:player.y,
                vx:Math.cos(angle)*p*0.18,
                vy:Math.sin(angle)*p*0.18,
                angle, life:120, trail:[],
                isFire: combo>=5
            });
            shots++;
            power=0;
            sndShoot();
        }
        
        // ==================== RESTART ====================
        function restartGame() {
            initAudio();
            running=true;
            score=0;shots=0;hits=0;wave=1;
            playerHP=100;combo=0;maxCombo=0;
            enemies=[];arrows=[];parts=[];floatingTexts=[];
            spawnTimer=0;enemiesLeft=5+wave*2;
            player.x=c.width/2;player.y=c.height-100;
            power=0;aiming=false;
            skills.explosion.cd=0;skills.freeze.cd=0;skills.lightning.cd=0;
            isFrozen=false;freezeTimer=0;
            document.getElementById('gameOver').classList.remove('show');
            document.getElementById('killFeed').innerHTML='';
            updateHUD();
            sndWave();
        }
        
        function gameOver() {
            running=false;
            document.getElementById('finalScore').textContent=score;
            document.getElementById('finalAcc').textContent=shots>0?Math.round(hits/shots*100)+'%':'0%';
            document.getElementById('finalWave').textContent=wave;
            document.getElementById('finalCombo').textContent=maxCombo+'x';
            document.getElementById('gameOver').classList.add('show');
            beep(35,0.6,'sawtooth',0.12);
            burst(player.x,player.y,'#ff0000',50,15);
        }
        
        function updateHUD() {
            document.getElementById('scoreHud').textContent=score;
            document.getElementById('hpHud').textContent=playerHP;
            document.getElementById('accHud').textContent=shots>0?Math.round(hits/shots*100)+'%':'0%';
            document.getElementById('waveHud').textContent=wave;
            document.getElementById('comboHud').textContent=combo+'x';
            
            // Skill cooldowns
            document.getElementById('cd1').textContent=skills.explosion.cd>0?Math.ceil(skills.explosion.cd/60)+'s':'';
            document.getElementById('cd2').textContent=skills.freeze.cd>0?Math.ceil(skills.freeze.cd/60)+'s':'';
            document.getElementById('cd3').textContent=skills.lightning.cd>0?Math.ceil(skills.lightning.cd/60)+'s':'';
            
            document.getElementById('skill1').classList.toggle('ready', skills.explosion.cd===0);
            document.getElementById('skill2').classList.toggle('ready', skills.freeze.cd===0);
            document.getElementById('skill3').classList.toggle('ready', skills.lightning.cd===0);
        }
        
        function nextWave() {
            wave++;
            enemiesLeft=5+wave*2;
            updateHUD();
            sndWave();
            addKillMsg('🌊 موج '+wave+' شروع شد!');
        }
        
        // ==================== UPDATE ====================
        function update() {
            if(!running) return;
            
            if(aiming) power=Math.min(power+3, MAX_POWER);
            
            // Combo timer
            if(comboTimer>0) {
                comboTimer--;
                if(comboTimer===0) combo=0;
            }
            
            // Freeze
            if(isFrozen) {
                freezeTimer--;
                if(freezeTimer<=0) isFrozen=false;
            }
            
            // Skills cooldown
            for(let s in skills) {
                if(skills[s].cd>0) skills[s].cd--;
